<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Content Checker</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #f1f5f9; display: flex; justify-content: center; padding: 40px 20px; }
        .card { width: 100%; max-width: 600px; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h2 { margin-bottom: 10px; color: #1e293b; }
        textarea { width: 100%; height: 180px; padding: 12px; border-radius: 6px; border: 1px solid #cbd5e1; font-size: 1rem; margin-top: 10px; resize: none; }
        button { width: 100%; background: #2563eb; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .result { margin-top: 20px; padding: 15px; border-radius: 6px; color: white; display: none; text-align: center; font-weight: bold; }
        .ai { background: #ef4444; }
        .human { background: #10b981; }
    </style>
</head>
<body>
    <div class="card">
        <h2>🔍 AI vs Human Text Detector</h2>
        <p style="color:#64748b;">Paste a paragraph to check its authenticity.</p>
        <textarea id="text" placeholder="Type or paste text here..."></textarea>
        <button id="btn" onclick="checkText()">Analyze Text</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        async function checkText() {
            const text = document.getElementById('text').value.trim();
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('btn');
            
            if(!text) return alert("Please enter text!");
            
            btn.disabled = true;
            btn.innerText = "Analyzing...";
            resultDiv.style.display = "none";

            try {
                const res = await fetch('/api/detect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                
                resultDiv.style.display = "block";
                if(data.verdict === 'AI') {
                    resultDiv.className = "result ai";
                    resultDiv.innerText = `🤖 Verdict: AI Generated (${data.confidence}%)`;
                } else {
                    resultDiv.className = "result human";
                    resultDiv.innerText = `✍️ Verdict: Human Written (${data.confidence}%)`;
                }
            } catch (e) {
                alert("Error analyzing text.");
            }
            btn.disabled = false;
            btn.innerText = "Analyze Text";
        }
    </script>
</body>
</html>
